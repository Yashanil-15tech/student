{% extends 'base/base.html' %}
{% block title %}Faculty Profile{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card shadow">
      <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
        <h4 class="mb-0"><i class="fas fa-user-circle"></i> Faculty Profile</h4>
      </div>
      <div class="card-body">
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}
          <div class="row mb-3">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">First Name</label>
              <input type="text" class="form-control" name="first_name" value="{{ faculty.user.first_name }}">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">Last Name</label>
              <input type="text" class="form-control" name="last_name" value="{{ faculty.user.last_name }}">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Email</label>
            <input type="email" class="form-control" name="email" value="{{ faculty.user.email }}">
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Employee ID</label>
            <input type="text" class="form-control" value="{{ faculty.employee_id }}" disabled>
            <small class="text-muted">Employee ID cannot be changed.</small>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Department</label>
            <input type="text" class="form-control" name="department" value="{{ faculty.department }}">
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Phone</label>
            <input type="tel" class="form-control" name="phone" value="{{ faculty.phone }}">
          </div>
          <div class="mb-4">
            <label class="form-label fw-bold">Profile Picture</label>
            {% if faculty.profile_picture %}
            <div class="mb-2">
              <img src="{{ faculty.profile_picture.url }}" class="rounded-circle" width="80" height="80" style="object-fit:cover">
            </div>
            {% endif %}
            <input type="file" class="form-control" name="profile_picture" accept="image/*">
          </div>
          <button type="submit" class="btn btn-success"><i class="fas fa-save"></i> Save Changes</button>
          <a href="{% url 'faculty_dashboard' %}" class="btn btn-secondary ms-2">Cancel</a>
        </form>
        <hr>
        <a href="{% url 'password_reset' %}" class="btn btn-outline-warning btn-sm">
          <i class="fas fa-key"></i> Change Password
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
