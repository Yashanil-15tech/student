{% extends 'base/base.html' %}
{% block title %}Set New Password{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow">
      <div class="card-header bg-primary text-white"><h5><i class="fas fa-lock"></i> Set New Password</h5></div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          {{ form.as_p }}
          <button type="submit" class="btn btn-primary w-100">Set Password</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
