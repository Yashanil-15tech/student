{% extends 'base/base.html' %}
{% block title %}Create Quiz{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card shadow">
      <div class="card-header bg-success text-white">
        <h5><i class="fas fa-plus"></i> Create New Quiz</h5>
      </div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-bold">Title <span class="text-danger">*</span></label>
            <input type="text" class="form-control" name="title" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Course <span class="text-danger">*</span></label>
            <select class="form-select" name="course_id" required>
              <option value="">-- Select Course --</option>
              {% for course in courses %}
              <option value="{{ course.id }}">{{ course.code }} — {{ course.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Description</label>
            <textarea class="form-control" name="description" rows="2"></textarea>
          </div>
          <div class="row">
            <div class="col-md-4 mb-3">
              <label class="form-label fw-bold">Duration (minutes) <span class="text-danger">*</span></label>
              <input type="number" class="form-control" name="duration_minutes" min="1" value="30" required>
            </div>
            <div class="col-md-4 mb-3">
              <label class="form-label fw-bold">Total Marks <span class="text-danger">*</span></label>
              <input type="number" class="form-control" name="total_marks" min="1" value="10" required>
            </div>
            <div class="col-md-4 mb-3">
              <label class="form-label fw-bold">Passing Marks <span class="text-danger">*</span></label>
              <input type="number" class="form-control" name="passing_marks" min="0" value="5" required>
            </div>
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">Start Time <span class="text-danger">*</span></label>
              <input type="datetime-local" class="form-control" name="start_time" required>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">End Time <span class="text-danger">*</span></label>
              <input type="datetime-local" class="form-control" name="end_time" required>
            </div>
          </div>
          <div class="row mb-3">
            <div class="col-md-6">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="shuffle_questions" id="shuffle" checked>
                <label class="form-check-label" for="shuffle">Shuffle Questions</label>
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="show_results" id="show_results" checked>
                <label class="form-check-label" for="show_results">Show Results After Submission</label>
              </div>
            </div>
          </div>
          <button type="submit" class="btn btn-success">
            <i class="fas fa-arrow-right"></i> Create & Add Questions
          </button>
          <a href="{% url 'faculty_manage_quizzes' %}" class="btn btn-secondary ms-2">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
